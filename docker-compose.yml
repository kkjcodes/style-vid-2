services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build: .
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - stylevid_data:/tmp/stylevid2
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A backend.workers.celery_app worker --loglevel=info -Q generation -c 2
    env_file: .env
    volumes:
      - stylevid_data:/tmp/stylevid2
    depends_on:
      redis:
        condition: service_healthy

volumes:
  stylevid_data:
